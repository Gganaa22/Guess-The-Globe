<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Улс орны таавар - Нэвтрэх</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="auth-container">
        <h1 class="game-title"> Улс орны таавар</h1>
        
        <div class="auth-box">
            <h2 id="form-title">Нэвтрэх</h2>
            <form id="auth-form">
                <div class="input-group">
                    <label for="email">Имэйл хаяг:</label>
                    <input type="email" id="email" required placeholder="example@mail.com">
                </div>
                <div class="input-group">
                    <label for="password">Нууц үг:</label>
                    <input type="password" id="password" required placeholder="Минимум 6 тэмдэгт" minlength="6">
                </div>
                <button type="submit" id="submit-btn" class="btn-primary">Нэвтрэх</button>
            </form>
            
            <p class="toggle-text">
                Шинэ хэрэглэгч үү? <a href="#" id="toggle-auth">Бүртгүүлэх</a>
            </p>
            <p id="error-msg" class="error-text"></p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
